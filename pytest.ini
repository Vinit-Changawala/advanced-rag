# ============================================================
# pytest.ini
#
# PURPOSE: Configure pytest behavior for the entire project.
#
# BEGINNER CONCEPT — Why configure pytest?
# By default, pytest searches for tests everywhere and uses
# basic settings. This config file customizes:
# - Where to look for tests
# - What test files look like (test_*.py)
# - Default command-line options (always show verbose output)
# - Custom markers (slow, integration, stress)
# - Coverage settings (track which lines of code are tested)
# ============================================================

[pytest]

# ── Test Discovery ────────────────────────────────────────────
# Where pytest looks for test files
testpaths = tests

# Pattern for test files (any file matching this is a test file)
python_files = test_*.py

# Pattern for test classes and functions
python_classes = Test*
python_functions = test_*

# ── Default Options (applied to every pytest run) ─────────────
# -v:          verbose — show each test name as it runs
# --tb=short:  short traceback format (readable error messages)
# -ra:         show extra summary for all except passed tests
addopts =
    -v
    --tb=short
    -ra

# ── Custom Markers ────────────────────────────────────────────
# Markers let you run subsets of tests:
#   pytest -m slow           → only slow tests
#   pytest -m "not slow"     → skip slow tests
#   pytest -m integration    → only integration tests
markers =
    slow: Tests that take more than 5 seconds (LLM calls, DB operations)
    integration: Tests that require real external services (Postgres, Qdrant)
    stress: Adversarial red-team tests
    unit: Fast isolated unit tests (default, no marker needed)

# ── Warning Filters ───────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# ── Log Capture ───────────────────────────────────────────────
# Show log messages during test runs (helps debug failing tests)
log_cli = true
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s: %(message)s
log_date_format = %H:%M:%S
